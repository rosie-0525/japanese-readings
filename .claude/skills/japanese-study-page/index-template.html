<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{{PAGE_TITLE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1efe7;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans CJK JP', 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Microsoft YaHei', sans-serif;
            line-height: 1.65;
            padding: 2rem 1rem;
            color: #2b2a26;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fffef9;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 2.2rem 2rem 2.4rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            border-left: 6px solid #8b3c2c;
            padding-left: 1.2rem;
            margin-bottom: 0.5rem;
            color: #2d2a23;
        }
        .sub {
            color: #6e6558;
            margin-bottom: 1.4rem;
            font-size: 0.9rem;
            border-bottom: 1px solid #e2dbcf;
            padding-bottom: 0.9rem;
        }
        .intro {
            background: #faf6ed;
            border-radius: 20px;
            padding: 1rem 1.4rem;
            font-size: 0.85rem;
            color: #5c5343;
            margin-bottom: 2rem;
        }
        .chapter-block { margin-bottom: 2.2rem; }
        .chapter-head {
            font-size: 1.3rem;
            font-weight: 700;
            color: #4b3f2f;
            background: #f0ece0;
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 1rem;
        }
        .chapter-note { font-size: 0.8rem; color: #7b6e5c; margin: -0.4rem 0 1rem 0.3rem; }
        .toc-list { display: flex; flex-direction: column; gap: 0.7rem; }
        a.toc-card {
            display: flex;
            align-items: flex-start;
            gap: 0.95rem;
            text-decoration: none;
            background: #ffffff;
            border: 1px solid #e1d8cc;
            border-radius: 18px;
            padding: 0.9rem 1.15rem;
            transition: background 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
        }
        a.toc-card:hover {
            background: #fefaf0;
            border-color: #d8c8a8;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
        }
        .toc-num {
            flex: none;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: #8b3c2c;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.88rem;
        }
        .toc-body { flex: 1; }
        .toc-ja { font-weight: 600; color: #2d2a23; font-size: 1.02rem; }
        .toc-zh { font-size: 0.82rem; color: #6e6558; margin-top: 0.15rem; }
        .future-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }
        .future-chip {
            background: #f3efe6;
            border: 1px dashed #d6cdbb;
            border-radius: 14px;
            padding: 0.5rem 0.85rem;
            font-size: 0.82rem;
            color: #8a7f6c;
        }
        .future-chip .num { font-weight: 700; color: #a8957a; margin-right: 0.35rem; }
        .badge {
            display: inline-block;
            font-size: 0.68rem;
            background: #e7e0d2;
            color: #6e6558;
            border-radius: 10px;
            padding: 0.05rem 0.5rem;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        footer {
            text-align: center;
            font-size: 0.72rem;
            color: #938c7d;
            margin-top: 2rem;
            border-top: 1px solid #e2d9ce;
            padding-top: 1rem;
        }
        @media (max-width: 680px) {
            .container { padding: 1.3rem; }
            h1 { font-size: 1.55rem; }
        }
        /* --- 错题复习 · 难词练习 (cross-lesson MC review, localStorage-driven) --- */
        .review-block {
            background: #faf6ed;
            border: 1px solid #ece1cc;
            border-radius: 20px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2.2rem;
        }
        .review-head {
            font-size: 1.2rem; font-weight: 700; color: #4b3f2f;
            background: #f0ece0; display: inline-block;
            padding: 0.2rem 1.1rem; border-radius: 40px; margin-bottom: 0.7rem;
        }
        .review-note { font-size: 0.82rem; color: #7b6e5c; margin-bottom: 1rem; }
        .review-controls { display: flex; align-items: center; gap: 1.1rem; margin-top: 1rem; flex-wrap: wrap; }
        .rv-count { font-size: 0.8rem; color: #6e6558; }
        .vp-btn {
            background: #8b3c2c; color: #fdfaf2; border: none; cursor: pointer;
            padding: 0.5rem 1.5rem; border-radius: 22px; font-size: 0.9rem; font-weight: 600;
            font-family: inherit; transition: background 0.2s;
        }
        .vp-btn:hover { background: #76301f; }
        .vp-reset { font-size: 0.78rem; color: #9a8f7d; text-decoration: none; cursor: pointer; }
        .vp-reset:hover { text-decoration: underline; }
        .quiz-card {
            background: #fffef9; border: 1px solid #e1d8cc; border-radius: 20px;
            padding: 1.3rem 1.5rem; max-width: 560px; margin-top: 0.6rem;
        }
        .quiz-progress { font-size: 0.76rem; color: #7b6e5c; margin-bottom: 0.6rem; }
        .quiz-q { font-size: 1.7rem; font-weight: 600; color: #2d2a23; line-height: 1.3; }
        .quiz-q .qhint { font-size: 0.95rem; color: #b45f2a; font-weight: normal; margin-left: 0.55rem; }
        .quiz-ask { font-size: 0.8rem; color: #6e6558; margin: 0.25rem 0 0.95rem; }
        .quiz-opts { display: flex; flex-direction: column; gap: 0.55rem; }
        .quiz-opt {
            text-align: left; background: #f6f3ea; border: 1px solid #e1d8cc; border-radius: 14px;
            padding: 0.6rem 1rem; font-size: 0.95rem; font-family: inherit; color: #2b2a26;
            cursor: pointer; transition: background 0.15s, border-color 0.15s;
        }
        .quiz-opt:hover:not(:disabled) { background: #efeadd; }
        .quiz-opt:disabled { cursor: default; }
        .quiz-opt.correct { background: #e3f0e2; border-color: #8fbf8a; color: #1f5d2a; }
        .quiz-opt.wrong { background: #f7e0db; border-color: #d99b8c; color: #8b3c2c; }
        .quiz-reveal { font-size: 0.82rem; color: #5c5343; margin-top: 0.8rem; min-height: 1.1rem; }
        .quiz-reveal .qr-r { color: #b45f2a; margin: 0 0.3rem; }
        .quiz-reveal .qr-src { color: #9a8f7d; margin-left: 0.4rem; }
        .quiz-next { margin-top: 0.95rem; }
        .quiz-summary { font-size: 0.98rem; color: #2d2a23; }
        .quiz-summary b { color: #8b3c2c; }
        .quiz-reveal .qr-err { color: #b0461f; }
        /* --- auth bar (Supabase email/password login) + review gate --- */
        .auth-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.45rem; justify-content: flex-end; margin-bottom: 1.4rem; font-size: 0.82rem; }
        .auth-bar input { font-family: inherit; font-size: 0.82rem; padding: 0.35rem 0.6rem; border: 1px solid #d8cdbb; border-radius: 12px; background: #fff; color: #2b2a26; }
        .auth-bar .ab-user { color: #5c5343; margin-right: 0.3rem; }
        .auth-bar .ab-msg { color: #b0461f; font-size: 0.76rem; flex-basis: 100%; text-align: right; }
        .auth-btn { background: #8b3c2c; color: #fdfaf2; border: none; cursor: pointer; padding: 0.35rem 0.95rem; border-radius: 14px; font-size: 0.8rem; font-weight: 600; font-family: inherit; }
        .auth-btn:hover { background: #76301f; }
        .auth-btn.ghost { background: #efeadd; color: #6e5a3f; }
        .auth-btn.ghost:hover { background: #e4dcc9; }
        .vp-gate { font-size: 0.84rem; color: #9a6a30; background: #fbf3e3; border: 1px solid #ecd9b8; border-radius: 12px; padding: 0.5rem 0.85rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>{{H1}}</h1>
    <div class="sub">{{SUB}}</div>

    <!-- Supabase email/password login; the review engine fills this in. -->
    <div class="auth-bar" id="auth-bar"></div>

    <div class="intro">
        {{INTRO}}
    </div>

{{CHAPTER_BLOCKS}}

    <!-- 🎴 错题复习: cross-lesson MC review built from this user's database stats; not a
         .chapter-block, so the extractor's index round-trip ignores it. -->
    <div class="review-block">
        <div class="review-head">🎴 错题复习 · 难词练习</div>
        <div class="review-note">汇集你在各课「单词练习」中最易出错的词，跨课集中复习。答对会降低难度，逐步从难词中移除。</div>
        <div id="rv-stage"></div>
        <div class="review-controls">
            <span class="vp-gate" id="rv-gate">登录后查看你的跨课难词复习（在页面顶部注册 / 登录）。</span>
            <button class="vp-btn" id="rv-start" type="button">开始复习</button>
            <span class="rv-count" id="rv-count"></span>
            <a class="vp-reset" id="rv-reset">清除全部练习记录</a>
        </div>
    </div>

    <!-- 后续章节（待补充） -->
    <div class="chapter-block">
        <div class="chapter-head">後続章節 <span class="badge">待补充</span></div>
        <div class="chapter-note">以下各章已备好原文文本，尚未制作精读页面。</div>
        <div class="future-list">
{{FUTURE_CHIPS}}
        </div>
    </div>

    <footer>
{{FOOTER}}
    </footer>
</div>
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  "use strict";
  // ---------- shared MC quiz core (identical to the page engine) ----------
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
  const ansField = c => (c.t === 'meaning' ? 'm' : 'r');
  function buildRound(deck, statsOf, size) {
    return deck.map(c => {
      const st = statsOf(c); const score = st ? st.score : 0, seen = st ? st.seen : 0;
      return { c, w: score * 2 + (seen === 0 ? 3 : 0) + Math.random() * 2 };
    }).sort((a, b) => b.w - a.w).slice(0, Math.min(size, deck.length)).map(x => x.c);
  }
  function buildOptions(card, pool) {
    const field = ansField(card), correct = card[field], seen = new Set([correct]), out = [];
    for (const c of shuffle(pool.filter(c => c[field] && c[field] !== correct))) {
      if (seen.has(c[field])) continue;
      seen.add(c[field]); out.push(c[field]);
      if (out.length >= 3) break;
    }
    return shuffle([correct].concat(out));
  }
  function makeQuiz(stage, cfg) {
    let round = [], idx = 0, correctN = 0;
    function start() {
      round = buildRound(cfg.deck, cfg.statsOf, cfg.size || 12); idx = 0; correctN = 0;
      if (!round.length) { stage.innerHTML = '<div class="quiz-summary">暂无可练习的词。</div>'; return; }
      question();
    }
    function question() {
      const card = round[idx], field = ansField(card), correct = card[field];
      const options = buildOptions(card, cfg.pool);
      const ask = field === 'm' ? '选择正确的中文释义' : '选择正确的读音（假名）';
      const hint = (field === 'm' && card.r && card.r !== card.w) ? '<span class="qhint">' + esc(card.r) + '</span>' : '';
      stage.innerHTML =
        '<div class="quiz-card">'
        + '<div class="quiz-progress">第 ' + (idx + 1) + ' / ' + round.length + ' 题 · 正确 ' + correctN + '</div>'
        + '<div class="quiz-q">' + esc(card.w) + hint + '</div>'
        + '<div class="quiz-ask">' + ask + '</div>'
        + '<div class="quiz-opts">'
        + options.map(o => '<button class="quiz-opt" type="button">' + esc(o) + '</button>').join('')
        + '</div>'
        + '<div class="quiz-reveal"></div>'
        + '<div class="quiz-next"></div>'
        + '</div>';
      stage.querySelectorAll('.quiz-opt').forEach(btn => btn.addEventListener('click', async () => {
        const ok = btn.textContent === correct;
        stage.querySelectorAll('.quiz-opt').forEach(b => {
          b.disabled = true;
          if (b.textContent === correct) b.classList.add('correct');
          else if (b === btn) b.classList.add('wrong');
        });
        if (ok) correctN++;
        const reveal = stage.querySelector('.quiz-reveal');
        reveal.innerHTML =
          (ok ? '✅ 正确　' : '❌ 正确答案如上　')
          + '<b>' + esc(card.w) + '</b><span class="qr-r">' + esc(card.r) + '</span>'
          + (card.m ? '— ' + esc(card.m) : '')
          + (cfg.showSrc && card.slug ? '<span class="qr-src">· ' + esc(card.slug) + '</span>' : '');
        try { await cfg.record(card, ok); } catch (e) { reveal.innerHTML += '<span class="qr-err"> · 保存失败</span>'; }
        if (cfg.onAnswer) cfg.onAnswer();
        const next = stage.querySelector('.quiz-next'), last = idx + 1 >= round.length;
        next.innerHTML = '<button class="vp-btn" type="button">' + (last ? '查看结果' : '下一题') + '</button>';
        next.querySelector('button').addEventListener('click', () => { if (last) summary(); else { idx++; question(); } });
      }));
    }
    function summary() {
      stage.innerHTML = '<div class="quiz-summary">本组完成：正确 <b>' + correctN + '</b> / ' + round.length
        + '　<button class="vp-btn" type="button" style="margin-left:0.6rem">再来一组</button></div>';
      stage.querySelector('button').addEventListener('click', start);
      if (cfg.onAnswer) cfg.onAnswer();
    }
    return { start };
  }

  // ---------- Supabase client + auth ----------
  const cfgOK = !!(window.SUPA_URL && window.SUPA_ANON_KEY && window.supabase);
  const sb = cfgOK ? window.supabase.createClient(window.SUPA_URL, window.SUPA_ANON_KEY) : null;
  let user = null;
  const $ = id => document.getElementById(id);
  const stageEl = $('rv-stage');

  function renderAuth() {
    const bar = $('auth-bar'); if (!bar) return;
    if (!cfgOK) { bar.innerHTML = '<span class="ab-msg">未配置数据库：把 supabase-config.example.js 复制为 supabase-config.js 并填入项目信息</span>'; return; }
    if (user) {
      bar.innerHTML = '<span class="ab-user">👤 ' + esc(user.email) + '</span><button class="auth-btn ghost" id="ab-logout" type="button">退出</button>';
      $('ab-logout').addEventListener('click', () => sb.auth.signOut());
    } else {
      bar.innerHTML =
        '<input id="ab-email" type="email" placeholder="邮箱" autocomplete="username">'
        + '<input id="ab-pass" type="password" placeholder="密码" autocomplete="current-password">'
        + '<button class="auth-btn" id="ab-login" type="button">登录</button>'
        + '<button class="auth-btn ghost" id="ab-signup" type="button">注册</button>'
        + '<span class="ab-msg" id="ab-msg"></span>';
      const email = () => $('ab-email').value.trim(), pass = () => $('ab-pass').value, msg = t => { $('ab-msg').textContent = t || ''; };
      $('ab-login').addEventListener('click', async () => {
        msg('登录中…'); const { error } = await sb.auth.signInWithPassword({ email: email(), password: pass() });
        if (error) msg('登录失败：' + error.message);
      });
      $('ab-signup').addEventListener('click', async () => {
        msg('注册中…'); const { error } = await sb.auth.signUp({ email: email(), password: pass() });
        msg(error ? ('注册失败：' + error.message) : '注册成功；若开启了邮箱验证，请查收邮件后再登录。');
      });
    }
  }
  function applyGate() {
    const on = !!user;
    if ($('rv-gate')) $('rv-gate').style.display = on ? 'none' : 'inline-block';
    if ($('rv-start')) $('rv-start').style.display = on ? 'inline-block' : 'none';
    if ($('rv-reset')) $('rv-reset').style.display = on ? 'inline' : 'none';
    if (!on && stageEl) stageEl.innerHTML = '';
  }

  // ---------- DB-backed review ----------
  async function recordAnswer(card, ok) {
    if (!sb || !user) throw new Error('not signed in');
    const { error } = await sb.rpc('record_attempt', { p_slug: card.slug, p_word: card.w, p_reading: card.r || '', p_meaning: card.m, p_type: card.t, p_correct: ok });
    if (error) throw error;
  }
  async function fetchHardDeck() {
    if (!sb || !user) return [];
    try {
      const { data, error } = await sb.from('user_word_stats')
        .select('slug,word,reading,meaning,type,seen,correct,score').gt('score', 0)
        .order('score', { ascending: false }).limit(80);
      if (error || !data) return [];
      return data.map(r => ({ w: r.word, r: r.reading, m: r.meaning, t: r.type, slug: r.slug, score: r.score, seen: r.seen }));
    } catch (e) { return []; }
  }
  async function fetchPool() {
    if (!sb) return [];
    try {
      const { data, error } = await sb.from('words').select('word,reading,meaning,type').limit(800);
      if (error || !data) return [];
      return data.map(r => ({ w: r.word, r: r.reading, m: r.meaning, t: r.type }));
    } catch (e) { return []; }
  }
  async function updateCount() {
    const el = $('rv-count'); if (!el) return;
    if (!sb || !user) { el.textContent = ''; return; }
    const { count } = await sb.from('user_word_stats').select('*', { count: 'exact', head: true }).gt('score', 0);
    el.textContent = count ? ('当前难词 ' + count + ' 个') : '还没有错题记录——先到课文页练习。';
  }

  async function startReview() {
    if (!sb || !user) return;
    stageEl.innerHTML = '<div class="quiz-summary">加载中…</div>';
    try {
      const deck = await Promise.race([
        fetchHardDeck(),
        new Promise((_, rej) => setTimeout(() => rej(new Error('加载超时')), 8000)),
      ]);
      if (!deck.length) {
        stageEl.innerHTML = '<div class="quiz-summary">还没有错题记录。到任意课文页做「🎴 单词练习」后，这里会汇集你的难词。</div>';
        return;
      }
      let pool = await fetchPool(); if (!pool.length) pool = deck;
      const statsMap = {}; deck.forEach(c => statsMap[c.w] = { score: c.score, seen: c.seen });
      makeQuiz(stageEl, { deck, pool, statsOf: c => statsMap[c.w], size: 15, record: recordAnswer, onAnswer: updateCount, showSrc: true }).start();
    } catch (e) {
      stageEl.innerHTML = '<div class="quiz-summary">加载失败：' + esc(e.message)
        + '　<button class="vp-btn" type="button" id="rv-retry">重试</button></div>';
      const r = $('rv-retry'); if (r) r.addEventListener('click', startReview);
    }
  }
  if ($('rv-start')) $('rv-start').addEventListener('click', startReview);
  if ($('rv-reset')) $('rv-reset').addEventListener('click', async () => {
    if (!sb || !user) return; if (!confirm('清除你的全部练习记录？')) return;
    await sb.from('user_word_stats').delete().eq('user_id', user.id);
    if (stageEl) stageEl.innerHTML = ''; updateCount();
  });

  // Not async on purpose: updateCount() runs a Supabase query, and onAuthStateChange fires
  // while GoTrue holds its navigator.locks auth lock — awaiting here would deadlock (加载中…
  // forever). Defer the read to a fresh task so it runs after the lock is released.
  function syncAuth(session) { user = session ? session.user : null; renderAuth(); applyGate(); setTimeout(updateCount, 0); }
  renderAuth(); applyGate();
  if (sb) {
    sb.auth.getSession().then(({ data }) => syncAuth(data.session));
    sb.auth.onAuthStateChange((_e, session) => syncAuth(session));
  }
})();
</script>
</body>
</html>
